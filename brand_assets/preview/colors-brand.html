<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Brand Palette</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);font-family:var(--font-sans);font-weight:300;color:var(--dr-cream);}
  .wrap{width:700px;padding:18px 20px;box-sizing:border-box;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .swatch{border:1px solid rgba(216,210,200,0.10);border-radius:4px;overflow:hidden;background:var(--dr-ink-2,#25221E);}
  .chip{height:54px;}
  .body{padding:8px 10px 10px;}
  .name{font-family:var(--font-serif);font-size:15px;line-height:1;}
  .hex{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--dr-stone);margin-top:4px;text-transform:uppercase;}
  .use{font-family:var(--font-mono);font-size:9px;letter-spacing:0.10em;color:var(--dr-stone);margin-top:6px;text-transform:uppercase;}
</style>
</head><body>
  <div class="wrap">
    <div class="row">
      <div class="swatch"><div class="chip" style="background:#1C1A17;border-bottom:1px solid rgba(216,210,200,0.10)"></div><div class="body"><div class="name">Ink</div><div class="hex">#1C1A17</div><div class="use">Principal · Fondos</div></div></div>
      <div class="swatch"><div class="chip" style="background:#F4F1EB"></div><div class="body"><div class="name">Cream</div><div class="hex">#F4F1EB</div><div class="use">Fondo claro · Superficies</div></div></div>
      <div class="swatch"><div class="chip" style="background:#D85A2B"></div><div class="body"><div class="name">Ember</div><div class="hex">#D85A2B</div><div class="use">Acento · CTAs · Énfasis</div></div></div>
      <div class="swatch"><div class="chip" style="background:#8C8377"></div><div class="body"><div class="name">Stone</div><div class="hex">#8C8377</div><div class="use">Texto secundario</div></div></div>
      <div class="swatch"><div class="chip" style="background:#F8C4B0"></div><div class="body"><div class="name">Ember Light</div><div class="hex">#F8C4B0</div><div class="use">Tags · Badges suaves</div></div></div>
      <div class="swatch"><div class="chip" style="background:#D8D2C8"></div><div class="body"><div class="name">Line</div><div class="hex">#D8D2C8</div><div class="use">Bordes · Divisores</div></div></div>
    </div>
  </div>
</body></html>
