<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Type — Sans (DM Sans Light)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;}
  .eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--dr-ember);margin-bottom:10px;}
  .eyebrow::before{content:"// ";opacity:0.7;}
  .specimen{font-family:"DM Sans";font-weight:300;font-size:22px;line-height:1.45;color:var(--dr-cream);max-width:600px;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--dr-stone);margin-top:14px;}
</style>
</head><body>
  <div class="wrap">
    <div class="eyebrow">Sans — DM Sans Light 300</div>
    <div class="specimen">Pasé 12 años dentro de Fortune 500. Ahora enseño a consultores a integrar AI sin código.</div>
    <div class="meta">Uso: Cuerpo de texto · Párrafos · Descripciones</div>
  </div>
</body></html>
