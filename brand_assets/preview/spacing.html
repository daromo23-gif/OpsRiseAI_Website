<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Spacing scale</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:18px 24px;box-sizing:border-box;}
  .row{display:grid;grid-template-columns:80px 60px 1fr;gap:14px;align-items:center;padding:5px 0;font-family:"Space Mono";font-size:11px;letter-spacing:0.04em;color:var(--dr-stone);}
  .name{color:var(--dr-cream);}
  .px{color:var(--dr-ember);}
  .bar{height:14px;background:var(--dr-ember);border-radius:2px;}
</style>
</head><body>
  <div class="wrap">
    <div class="row"><span class="name">space-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div></div>
    <div class="row"><span class="name">space-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div></div>
    <div class="row"><span class="name">space-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div></div>
    <div class="row"><span class="name">space-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div></div>
    <div class="row"><span class="name">space-5</span><span class="px">24 px</span><div class="bar" style="width:24px"></div></div>
    <div class="row"><span class="name">space-6</span><span class="px">32 px</span><div class="bar" style="width:32px"></div></div>
    <div class="row"><span class="name">space-7</span><span class="px">48 px</span><div class="bar" style="width:48px"></div></div>
    <div class="row"><span class="name">space-8</span><span class="px">64 px</span><div class="bar" style="width:64px"></div></div>
    <div class="row"><span class="name">space-9</span><span class="px">96 px</span><div class="bar" style="width:96px"></div></div>
  </div>
</body></html>
