<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);font-family:var(--font-sans);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;}
  .group{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dr-stone);width:90px;}
  .btn{font-family:"Space Mono";font-size:13px;letter-spacing:0.10em;text-transform:uppercase;border:none;border-radius:4px;padding:11px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .primary{background:var(--dr-ember);color:var(--dr-cream);}
  .primary.hover{background:#BF4D22;box-shadow:0 0 0 1px rgba(216,90,43,0.35),0 6px 20px rgba(216,90,43,0.25);}
  .secondary{background:transparent;color:var(--dr-cream);border:1px solid var(--dr-ember);}
  .ghost{background:transparent;color:var(--dr-cream);}
  .ghost:hover{color:var(--dr-ember);}
</style>
</head><body>
  <div class="wrap">
    <div class="group"><span class="meta">Primary</span><button class="btn primary">UNIRSE AHORA →</button><button class="btn primary hover">UNIRSE AHORA →</button></div>
    <div class="group"><span class="meta">Secondary</span><button class="btn secondary">VER CASOS REALES</button></div>
    <div class="group" style="margin-bottom:0;"><span class="meta">Ghost</span><button class="btn ghost">LEER MÁS</button></div>
  </div>
</body></html>
