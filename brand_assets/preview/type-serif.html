<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Type — Serif (DM Serif Display)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;}
  .eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--dr-ember);margin-bottom:10px;}
  .eyebrow::before{content:"// ";opacity:0.7;}
  .specimen{font-family:"DM Serif Display";font-weight:400;font-size:60px;line-height:1.05;letter-spacing:-0.01em;}
  .alpha{font-family:"DM Serif Display";font-weight:400;font-size:18px;color:var(--dr-stone);margin-top:14px;line-height:1.4;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--dr-stone);margin-top:12px;}
</style>
</head><body>
  <div class="wrap">
    <div class="eyebrow">Serif — DM Serif Display</div>
    <div class="specimen">Sin código.</div>
    <div class="alpha">Aa Bb Cc Dd Ee Ff Gg Hh Ii Jj Kk Ll Mm Nn Oo Pp Qq Rr Ss Tt Uu Vv Ww Xx Yy Zz</div>
    <div class="meta">Uso: Subheadlines · Títulos de sección · Display elegante</div>
  </div>
</body></html>
