<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Logo clearspace</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center;}
  .frame{position:relative;background:#25221E;border:1px dashed rgba(216,90,43,0.5);border-radius:6px;padding:32px;display:flex;align-items:center;gap:14px;justify-content:center;}
  .frame img{height:48px;width:auto;}
  .name{font-family:"DM Serif Display";font-size:24px;}
  .meta{font-family:"Space Mono";font-size:10px;text-transform:uppercase;letter-spacing:0.10em;color:var(--dr-stone);line-height:1.7;}
  .meta b{color:var(--dr-ember);font-weight:400;}
  .meta b::before{content:"// ";opacity:0.7;}
</style>
</head><body>
  <div class="wrap">
    <div class="frame">
      <img src="../assets/DR-logomark-ember.png" alt="" />
      <div class="name">Daniel Rojas</div>
    </div>
    <div class="meta">
      <b>Clearspace</b><br/>
      Espacio mínimo = altura de la letra "D"<br/><br/>
      <b>Tamaño mínimo</b><br/>
      Logomark · 16 px<br/>
      Lockup · 96 px ancho<br/><br/>
      <b>Fondo preferido</b><br/>
      Ink (oscuro)
    </div>
  </div>
</body></html>
