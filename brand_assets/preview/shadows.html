<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Elevation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);font-family:"Space Mono";}
  .wrap{width:700px;padding:24px;box-sizing:border-box;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:120px;height:70px;background:#2F2B26;border:1px solid rgba(216,210,200,0.18);border-radius:6px;}
  .b1{box-shadow:0 1px 0 rgba(0,0,0,0.20);}
  .b2{box-shadow:0 2px 8px rgba(0,0,0,0.30);}
  .b3{box-shadow:0 8px 24px rgba(0,0,0,0.40);}
  .ember{background:#D85A2B;border-color:transparent;box-shadow:0 0 0 1px rgba(216,90,43,0.35),0 6px 20px rgba(216,90,43,0.25);}
  .lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dr-stone);}
</style>
</head><body>
  <div class="wrap">
    <div class="cell"><div class="box b1"></div><div class="lbl">shadow-1</div></div>
    <div class="cell"><div class="box b2"></div><div class="lbl">shadow-2</div></div>
    <div class="cell"><div class="box b3"></div><div class="lbl">shadow-3</div></div>
    <div class="cell"><div class="box ember"></div><div class="lbl">shadow-ember</div></div>
  </div>
</body></html>
