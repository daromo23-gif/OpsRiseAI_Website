<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Radii & borders</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);font-family:"Space Mono";}
  .wrap{width:700px;padding:18px 24px;box-sizing:border-box;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:90px;height:64px;background:#2F2B26;border:1px solid rgba(216,210,200,0.18);}
  .lbl{font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--dr-stone);}
  .px{font-size:10px;color:var(--dr-ember);}
</style>
</head><body>
  <div class="wrap">
    <div class="cell"><div class="box" style="border-radius:2px"></div><div class="lbl">xs</div><div class="px">2 px</div></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="lbl">sm · default</div><div class="px">4 px</div></div>
    <div class="cell"><div class="box" style="border-radius:6px"></div><div class="lbl">md</div><div class="px">6 px</div></div>
    <div class="cell"><div class="box" style="border-radius:10px"></div><div class="lbl">lg</div><div class="px">10 px</div></div>
    <div class="cell"><div class="box" style="border-radius:16px"></div><div class="lbl">xl</div><div class="px">16 px</div></div>
  </div>
</body></html>
