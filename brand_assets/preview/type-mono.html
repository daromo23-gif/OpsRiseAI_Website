<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Type — Mono (Space Mono)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;}
  .eyebrow{font-family:"Space Mono";font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--dr-ember);margin-bottom:10px;}
  .eyebrow::before{content:"// ";opacity:0.7;}
  .specimen{font-family:"Space Mono";font-weight:400;font-size:30px;line-height:1.1;}
  .alpha{font-family:"Space Mono";font-weight:400;font-size:13px;letter-spacing:0.02em;color:var(--dr-stone);margin-top:14px;line-height:1.5;}
  .meta{font-family:"Space Mono";font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--dr-stone);margin-top:10px;}
</style>
</head><body>
  <div class="wrap">
    <div class="eyebrow">Monospace — Space Mono</div>
    <div class="specimen">// AI para consultores</div>
    <div class="alpha">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br/>abcdefghijklmnopqrstuvwxyz · 0123456789</div>
    <div class="meta">Uso: Labels · CTAs · Código · Metadatos · Tags</div>
  </div>
</body></html>
