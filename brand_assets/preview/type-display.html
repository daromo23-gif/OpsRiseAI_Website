<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>Type — Display (Silkscreen)</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--dr-ink);color:var(--dr-cream);}
  .wrap{width:700px;padding:22px 24px;box-sizing:border-box;}
  .eyebrow{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--dr-ember);margin-bottom:10px;}
  .eyebrow::before{content:"// ";opacity:0.7;}
  .specimen{font-family:"Silkscreen";font-weight:700;font-size:64px;line-height:1;text-transform:uppercase;letter-spacing:0;}
  .alpha{font-family:"Silkscreen";font-weight:400;font-size:14px;letter-spacing:0.04em;color:var(--dr-stone);margin-top:14px;line-height:1.6;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.10em;text-transform:uppercase;color:var(--dr-stone);margin-top:10px;}
</style>
</head><body>
  <div class="wrap">
    <div class="eyebrow">Display — Silkscreen Bold</div>
    <div class="specimen">Cobra más.</div>
    <div class="alpha">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br/>0123456789 !@#$%&amp;</div>
    <div class="meta">Uso: Hero headlines · Números grandes · Énfasis técnico</div>
  </div>
</body></html>
