<body class="dr">
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProofRow.jsx"></script>
<script type="text/babel" src="ModuleCard.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const { Nav, Hero, ProofRow, ModuleCard, Testimonial, CTASection, Footer } = window;

const modules = [
  { num: '01', title: 'Tu voz, no la del modelo', desc: 'Cómo escribir prompts que suenan a ti — no a un email genérico generado por AI.', duration: 'Sem 1', tag: 'Núcleo' },
  { num: '02', title: 'De entrevista a memo en una hora', desc: 'Captura, transcripción, síntesis. Un flujo que ya uso con clientes reales.', duration: 'Sem 2' },
  { num: '03', title: 'Propuestas que cierran', desc: 'Templates vivos. Cómo ensamblar una propuesta de Fortune 500 en una tarde.', duration: 'Sem 3', tag: 'Caso real' },
  { num: '04', title: 'Análisis cuantitativo sin código', desc: 'Excel + Claude + verificación. Modelos financieros sin pelear con Python.', duration: 'Sem 4' },
  { num: '05', title: 'Tu agente personal', desc: 'Construye un asistente que conoce tus clientes, tu tono y tu calendario.', duration: 'Sem 5', tag: 'Avanzado' },
  { num: '06', title: 'Demo & feedback en vivo', desc: 'Presentas tu flujo al grupo. Yo te doy feedback como lo daría a un junior partner.', duration: 'Sem 6' },
];

const App = () => (
  <>
    <Nav />
    <Hero />
    <ProofRow />

    <section id="modulos" style={{ padding: '96px 32px' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>
        <div style={{ fontFamily: '"Space Mono", monospace', fontSize: 12, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#D85A2B', marginBottom: 18 }}>// PROGRAMA — 6 SEMANAS</div>
        <h2 style={{ fontFamily: '"DM Serif Display", serif', fontWeight: 400, fontSize: 56, lineHeight: 1.05, color: '#F4F1EB', margin: '0 0 16px', maxWidth: 740 }}>Seis flujos que uso cada semana con clientes reales.</h2>
        <p style={{ fontFamily: '"DM Sans", sans-serif', fontWeight: 300, fontSize: 18, lineHeight: 1.6, color: '#C9C1B3', maxWidth: 640, margin: '0 0 56px' }}>
          Nada de teoría. Cada módulo es un flujo concreto que puedes copiar y pegar en tu próxima reunión.
        </p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
          {modules.map(m => <ModuleCard key={m.num} {...m} />)}
        </div>
      </div>
    </section>

    <section id="casos" style={{ padding: '64px 32px 96px', background: '#181613' }}>
      <div style={{ maxWidth: 880, margin: '0 auto' }}>
        <div style={{ fontFamily: '"Space Mono", monospace', fontSize: 12, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#D85A2B', marginBottom: 32 }}>// CASOS REALES</div>
        <div style={{ display: 'grid', gap: 16 }}>
          <Testimonial num="01" quote="Hoy cerré una propuesta usando este flujo exacto. Tres días de trabajo en una tarde." name="Lucía Mendieta" role="Senior Partner · Consultoría estratégica" />
          <Testimonial num="02" quote="Pensé que iba a tener que aprender Python. Resulta que solo tenía que aprender a hacer mejores preguntas." name="Carlos Iturralde" role="Director · Banca corporativa" />
        </div>
      </div>
    </section>

    <CTASection />
    <Footer />
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
